name: Build & Release

# Push a tag like v1.0.0 to build the installers and publish them as a
# GitHub Release. The macOS .dmg can only be produced on a macOS runner.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            script: build:win
          - os: macos-latest
            script: build:mac
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      # --publish never: electron-builder only packages. Uploading to the
      # Release is left to the step below, which uses the workflow token.
      - run: npm run ${{ matrix.script }} -- --publish never
        env:
          # Unsigned builds — skip electron-builder's signing-identity lookup.
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/*.exe
            dist/*.dmg
          draft: false
          generate_release_notes: true
