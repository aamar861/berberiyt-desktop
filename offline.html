<!doctype html>
<html lang="sq">
  <head>
    <meta charset="utf-8" />
    <title>Pa lidhje — BerberiYt</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000;
        color: #fff;
        font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
        text-align: center;
        padding: 24px;
      }
      .card { max-width: 380px; }
      h1 { font-size: 24px; font-weight: 700; margin: 24px 0 0; }
      p { margin: 12px 0 0; font-size: 14px; line-height: 1.6; color: rgba(255, 255, 255, 0.55); }
      button {
        margin-top: 28px;
        width: 100%;
        padding: 14px 28px;
        border: 0;
        border-radius: 16px;
        background: #fff;
        color: #000;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.2s;
      }
      button:hover { transform: scale(1.02); }
      svg { color: rgba(255, 255, 255, 0.35); }
    </style>
  </head>
  <body>
    <div class="card">
      <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 1l22 22" />
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55" />
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39" />
        <path d="M10.71 5.05A16 16 0 0 1 22.58 9" />
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88" />
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0" />
        <path d="M12 20h.01" />
      </svg>
      <h1>Nuk ka lidhje me internetin</h1>
      <p>
        BerberiYt ka nevojë për internet për të hapur rezervimet. Kontrollo
        lidhjen dhe provo përsëri.
      </p>
      <button onclick="location.replace('https://berberiyt.com')">
        Provo përsëri
      </button>
    </div>
  </body>
</html>
